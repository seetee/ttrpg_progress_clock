<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="22" fill="#1a1208"/>
  <!-- Background ring -->
  <circle cx="50" cy="50" r="36" fill="none" stroke="#3a0a0a" stroke-width="14"/>
  <!-- Filled arc: 4/6 = 240 degrees, starting from top (-90 deg = top) -->
  <!-- circumference = 2π×36 ≈ 226.19; 4/6 × 226.19 ≈ 150.79 -->
  <circle cx="50" cy="50" r="36" fill="none"
          stroke="#c01212" stroke-width="14"
          stroke-dasharray="150.79 226.19"
          stroke-dashoffset="0"
          transform="rotate(-90 50 50)"/>
  <!-- Center hole -->
  <circle cx="50" cy="50" r="22" fill="#1a1208"/>
  <!-- Center dot -->
  <circle cx="50" cy="50" r="4" fill="#c01212" opacity="0.7"/>
</svg>
