<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1a1208">
  <meta name="description" content="Progress Clocks — TTRPG session tool for Game Masters">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Progress Clocks</title>
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';
                 img-src 'self' data:; connect-src 'none'; base-uri 'none'; form-action 'none'">
  <link rel="manifest" href="manifest.json">
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Cold machined glass, warm phosphor on top — lifted from the npc overlay.
     The charge comes from the hue split: surfaces sit at 130, everything
     lit (text, accent, clock palettes) stays warm. */
  --bg:           oklch(9% 0.006 145);
  --surface:      oklch(17% 0.022 130);
  --surface-hi:   oklch(23% 0.020 130);
  --glass:        oklch(17% 0.022 130 / 0.88);
  --faint:        color-mix(in oklch, var(--accent) 20%, transparent);
  --on-surface:   oklch(91% 0.010 60);
  --on-muted:     oklch(64% 0.012 58);
  --accent:       oklch(70% 0.160 58);
  --accent-dk:    oklch(56% 0.160 55);
  --radius-sm:  0.5rem;
  --radius-md:  1.0rem;
  --radius-lg:  1.5rem;
  --ease:       200ms ease;

  /* Condensed grotesque — signage, legible across a table. System stacks only:
     a webfont would need a network fetch the offline SW can't guarantee. */
  --font-display: "Avenir Next Condensed", "Roboto Condensed",
                  "Liberation Sans Narrow", "Arial Narrow",
                  "DejaVu Sans Condensed", ui-sans-serif, sans-serif;
  color-scheme: dark;
  font-family: system-ui, -apple-system, sans-serif;
  font-size: clamp(0.9rem, 2.2vw, 1.05rem);
  line-height: 1.5;
}

body {
  /* Scanline field over a near-black ground. npc's lines are dark because that
     overlay sits on live video; on a dark page dark-on-dark is invisible, so
     these are light. The radial is the glow the plates sit in — without it the
     ground reads as one flat colour, since we have no video behind the glass. */
  background:
    repeating-linear-gradient(to bottom,
      oklch(82% 0.03 130 / 0.035) 0 1px, transparent 1px 3px),
    radial-gradient(135% 95% at 50% -8%,
      oklch(20% 0.026 132) 0%, transparent 58%),
    var(--bg);
  background-attachment: fixed;
  color: var(--on-surface);
  min-height: 100dvh;
  overflow-x: hidden;
}

.btn-icon svg path, .edit-toggle svg path, .fab svg path { fill: currentColor; }

.sr-only {
  position: absolute;
  width: 1px; height: 1px;
  margin: -1px; padding: 0; border: 0;
  overflow: hidden;
  clip-path: inset(50%);
  white-space: nowrap;
}

.clock-grid {
  list-style: none;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(260px, 100%), 1fr));
  gap: 1.25rem;
  padding: 1.25rem 1.25rem 7rem;
  align-content: start;
  min-height: 100dvh;
}

.empty-state {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  text-align: center;
  color: var(--on-muted);
  padding: 2rem;
  pointer-events: none;
}
.empty-state[hidden] { display: none; }
.empty-state p:first-of-type {
  font-family: var(--font-display);
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  color: var(--on-surface);
}
.empty-state .muted  { font-size: 0.88rem; }

.clock-card {
  /* Chamfered plate, not a web card. The cut corners are the strongest single
     marker in the npc overlay; same polygon, scaled up for a card. */
  background: var(--glass);
  border: 1px solid var(--faint);
  border-radius: var(--radius-md);
  padding: 1.5rem 1.25rem 1.25rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.875rem;
  position: relative;
  transition: border-color var(--ease), filter var(--ease);
}
.clock-card.is-complete {
  border-color: var(--c-glow);
  box-shadow: 0 0 0 1px var(--c-glow), 0 0 32px var(--c-glow);
}

.card-controls {
  position: absolute;
  top: 0.6rem;
  right: 0.6rem;
  display: none;
  gap: 0.25rem;
}
.edit-mode .card-controls { display: flex; }

.clock-svg {
  width: 100%;
  max-width: 220px;
  aspect-ratio: 1;
  cursor: pointer;
  user-select: none;
  touch-action: none;
  -webkit-tap-highlight-color: transparent;
  border-radius: 50%;
  display: block;
  transition: transform var(--ease);
}
.clock-svg:active { transform: scale(0.96); }
.clock-svg:focus-visible {
  outline: 3px solid var(--accent);
  outline-offset: 6px;
  border-radius: 50%;
}

.clock-svg .seg-f { fill: var(--c-base); }
.clock-svg .seg-e { fill: var(--c-empty); }

/* The clock breathes faster the closer it gets. --ratio (0–1) comes from
   app.js alongside --fill; an empty clock is near-dormant at 7s, a full one
   urgent at 1.7s. Everything that pulses reads --breath so the ring and the
   face can never drift into different tempos. */
.clock-card { --breath: calc(7s - 5.3s * var(--ratio, 0)); }

.clock-card[data-animated="true"] .clock-svg {
  animation: clock-pulse var(--breath) ease-in-out infinite;
}
/* Depth scales with --ratio too: speed alone left an empty clock flashing at
   full strength every cycle, which was most of the "hectic". */
@keyframes clock-pulse {
  0%, 100% { filter: none; }
  50%      { filter: brightness(calc(1 + 0.26 * var(--ratio, 0)))
                     drop-shadow(0 0 calc(3px + 8px * var(--ratio, 0)) var(--c-glow)); }
}

.complete-ring {
  fill: none;
  stroke: var(--c-glow);
  stroke-width: 2;
  animation: ring-throb var(--breath) ease-in-out infinite;
}
/* Always in the DOM so updateClock() only toggles a class — see app.js */
.clock-card:not(.is-complete) .complete-ring { display: none; }
@keyframes ring-throb {
  0%, 100% { stroke-opacity: 0.4; stroke-width: 1.5; }
  50%       { stroke-opacity: 1.0; stroke-width: 3.5; }
}

.sweep-arc {
  transform-origin: 50px 50px;
  animation: sweep-rotate 4s linear infinite;
}
@keyframes sweep-rotate {
  from { transform: rotate(-90deg); }
  to   { transform: rotate(270deg); }
}

.clock-center { fill: var(--surface); }
.clock-text {
  fill: var(--on-muted);
  font-size: 9px;
  font-family: system-ui, sans-serif;
  font-variant-numeric: tabular-nums;
  pointer-events: none;
  dominant-baseline: central;
  text-anchor: middle;
}

@keyframes dec-flash {
  0%   { filter: brightness(0.4) saturate(0.3); }
  100% { filter: none; }
}
.clock-svg.dec-flash { animation: dec-flash 380ms ease-out forwards !important; }

.clock-name {
  font-family: var(--font-display);
  font-size: 1.2rem;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  text-align: center;
  color: var(--on-surface);
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* The rule under the name carries the same count as the ring: a linear read
   for anyone too far from the table to resolve the segment gaps. */
.clock-card::after {
  content: "";
  width: 58%;
  max-width: 180px;
  height: 2px;
  margin-top: -0.45rem;
  border-radius: 1px;
  background: linear-gradient(to right,
    var(--c-base) var(--fill), var(--c-empty) var(--fill));
}
.clock-card.is-complete::after { box-shadow: 0 0 10px var(--c-glow); }

/* Registering --fill makes it interpolable, so the rule sweeps between segments
   instead of snapping. inherits must be true — --fill is set on .clock-card but
   read by ::after, which only sees it by inheritance. */
@property --fill {
  syntax: "<percentage>";
  inherits: true;
  initial-value: 0%;
}
.clock-card::after { transition: --fill 240ms cubic-bezier(0.3, 0, 0.2, 1); }

.btn-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 2rem;
  height: 2rem;
  border-radius: 50%;
  border: none;
  background: var(--surface-hi);
  color: var(--on-muted);
  cursor: pointer;
  transition: background var(--ease), color var(--ease);
}
.btn-icon:hover, .btn-icon:focus-visible {
  background: var(--surface-hi);
  color: var(--on-surface);
}
.btn-delete:hover, .btn-delete:focus-visible {
  background: oklch(30% 0.11 14);
  color: oklch(75% 0.15 14);
}

.ui-overlay {
  position: fixed;
  bottom: 1.5rem;
  left: 1.5rem;
  right: 1.5rem;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  pointer-events: none;
  z-index: 100;
}

.edit-toggle {
  pointer-events: all;
  width: 3rem;
  height: 3rem;
  border-radius: 50%;
  border: 2px solid var(--surface-hi);
  background: var(--surface);
  color: var(--on-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0.55;
  transition: opacity var(--ease), border-color var(--ease), color var(--ease), background var(--ease);
}
.edit-toggle:hover, .edit-toggle:focus-visible { opacity: 1; }
.edit-mode .edit-toggle {
  opacity: 1;
  border-color: var(--accent);
  color: var(--accent);
  background: oklch(20% 0.04 55);
}

.fab {
  pointer-events: all;
  width: 3.5rem;
  height: 3.5rem;
  border-radius: 50%;
  border: none;
  background: var(--accent);
  color: var(--bg);
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 14px oklch(0% 0 0 / 0.45);
  transition: transform var(--ease), box-shadow var(--ease);
}
.edit-mode .fab { display: flex; }
.fab:hover, .fab:focus-visible {
  transform: translateY(-3px);
  box-shadow: 0 8px 22px oklch(0% 0 0 / 0.6), 0 0 0 3px var(--accent-glow);
}

dialog {
  background: var(--surface-hi);
  color: var(--on-surface);
  border: 1px solid var(--faint);
  border-radius: var(--radius-lg);
  padding: 2rem;
  max-width: min(460px, calc(100vw - 2rem));
  width: 100%;
  margin: auto;
  box-shadow: 0 12px 40px oklch(0% 0 0 / 0.7);

  /* allow-discrete lets display/overlay participate, so the dialog animates out
     as well as in rather than vanishing on close. */
  opacity: 0;
  transform: scale(0.97) translateY(10px);
  transition: opacity 200ms ease, transform 200ms ease,
              overlay 200ms ease allow-discrete, display 200ms ease allow-discrete;
}
dialog[open] { opacity: 1; transform: none; }
@starting-style {
  dialog[open] { opacity: 0; transform: scale(0.97) translateY(10px); }
}
dialog::backdrop {
  background: oklch(0% 0 0 / 0.65);
  backdrop-filter: blur(6px);
  transition: opacity 200ms ease, overlay 200ms ease allow-discrete,
              display 200ms ease allow-discrete;
}
dialog[open]::backdrop { opacity: 1; }
@starting-style {
  dialog[open]::backdrop { opacity: 0; }
}
dialog h2 {
  font-family: var(--font-display);
  font-size: 1.6rem;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  margin-bottom: 1.5rem;
}

.field {
  margin-bottom: 1.25rem;
  border: none;
  padding: 0;
  min-width: 0;
}
.field > label, .field > legend {
  display: block;
  font-family: var(--font-display);
  font-size: 0.82rem;
  font-weight: 700;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  color: var(--on-muted);
  margin-bottom: 0.6rem;
}
.field input[type="text"] {
  width: 100%;
  padding: 0.65rem 0.875rem;
  background: var(--surface);
  border: 2px solid transparent;
  border-radius: var(--radius-sm);
  color: var(--on-surface);
  font-size: 1rem;
  transition: border-color var(--ease);
}
.field input[type="text"]:focus {
  outline: none;
  border-color: var(--accent);
}

.chip-group { display: flex; flex-wrap: wrap; gap: 0.5rem; }
.chip { cursor: pointer; position: relative; }
.chip input[type="radio"] { position: absolute; opacity: 0; width: 0; height: 0; }
.chip span {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 2.6rem;
  padding: 0.4rem 0.8rem;
  border-radius: 99px;
  border: 2px solid var(--surface);
  background: var(--surface);
  color: var(--on-muted);
  font-size: 0.9rem;
  font-weight: 600;
  transition: all var(--ease);
}
.chip input[type="radio"]:checked + span {
  background: var(--accent-dk);
  border-color: var(--accent);
  color: var(--on-surface);
}
.chip:hover span, .chip input[type="radio"]:focus-visible + span {
  border-color: var(--accent);
  color: var(--on-surface);
}

.custom-number {
  width: 100%;
  margin-top: 0.75rem;
  padding: 0.65rem 0.875rem;
  background: var(--surface);
  border: 2px solid transparent;
  border-radius: var(--radius-sm);
  color: var(--on-surface);
  font-size: 1rem;
  transition: border-color var(--ease);
}
.custom-number:focus { outline: none; border-color: var(--accent); }

.palette-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: 0.5rem;
}
.palette-option {
  cursor: pointer;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.45rem;
  padding: 0.75rem 0.5rem 0.6rem;
  border-radius: var(--radius-sm);
  border: 2px solid transparent;
  transition: border-color var(--ease), background var(--ease);
}
.palette-option input[type="radio"] { position: absolute; opacity: 0; width: 0; height: 0; }
.palette-option:has(input:checked) { border-color: var(--accent); background: var(--surface); }
.palette-option:hover { background: var(--surface); }
.palette-swatch {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: conic-gradient(var(--c-base) 0deg 270deg, var(--c-empty) 270deg 360deg);
  display: block;
  box-shadow: inset 0 0 0 6px var(--surface-hi);
}
.palette-option[data-animated] .palette-swatch {
  animation: swatch-shimmer 2.8s ease-in-out infinite;
}
@keyframes swatch-shimmer {
  0%, 100% { filter: none; }
  50%       { filter: brightness(1.3) drop-shadow(0 0 6px var(--c-glow)); }
}
.palette-label {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--on-muted);
  text-align: center;
  letter-spacing: 0.04em;
}
.palette-option:has(input:checked) .palette-label { color: var(--on-surface); }

.dialog-actions {
  display: flex;
  justify-content: flex-end;
  gap: 0.75rem;
  margin-top: 1.5rem;
}
.btn {
  padding: 0.65rem 1.35rem;
  border-radius: var(--radius-sm);
  border: none;
  font-family: var(--font-display);
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background var(--ease), color var(--ease);
}
.btn-ghost { background: transparent; color: var(--on-muted); }
.btn-ghost:hover { background: var(--surface); color: var(--on-surface); }
.btn-primary { background: var(--accent); color: oklch(12% 0.02 55); }
.btn-primary:hover { background: var(--accent-dk); color: var(--on-surface); }

:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

::-webkit-scrollbar { width: 6px; background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--surface-hi); border-radius: 3px; }

@supports (padding: env(safe-area-inset-bottom)) {
  .clock-grid  { padding-bottom: calc(6rem + env(safe-area-inset-bottom)); }
  .ui-overlay  { bottom: calc(1.5rem + env(safe-area-inset-bottom)); }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition-duration: 1ms !important; }
}
  </style>
</head>
<body>

  <main>
    <h1 class="sr-only">Progress Clocks</h1>
    <ul class="clock-grid" id="clock-grid"></ul>
  </main>

  <p class="sr-only" id="sr-status" role="status" aria-live="polite"></p>

  <div class="empty-state" id="empty-state" aria-live="polite">
    <svg viewBox="0 0 100 100" width="72" height="72" aria-hidden="true" focusable="false">
      <circle cx="50" cy="50" r="38" fill="none" stroke="currentColor"
              stroke-width="10" opacity="0.25"/>
      <path d="M50 12 A38 38 0 0 1 88 50" fill="none" stroke="currentColor"
            stroke-width="10" stroke-linecap="round" opacity="0.55"/>
    </svg>
    <p>No clocks running.</p>
    <p class="muted">Tap ✏ to enter edit mode, then + to add one.</p>
  </div>

  <div class="ui-overlay">
    <button class="edit-toggle" id="edit-toggle"
            aria-label="Toggle edit mode"
            aria-pressed="false"
            title="Toggle edit mode">
      <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" focusable="false">
        <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
      </svg>
    </button>
    <button class="fab" id="add-btn" aria-label="Add progress clock" title="Add clock">
      <svg viewBox="0 0 24 24" width="28" height="28" aria-hidden="true" focusable="false">
        <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
      </svg>
    </button>
  </div>

  <dialog id="clock-dialog" aria-labelledby="dialog-heading">
    <form id="clock-form" method="dialog" novalidate>
      <h2 id="dialog-heading">Add Clock</h2>

      <div class="field">
        <label for="f-name">Name</label>
        <input id="f-name" name="name" type="text"
               required maxlength="40" autocomplete="off"
               placeholder="e.g. Mansion Alert">
      </div>

      <fieldset class="field">
        <legend>Segments</legend>
        <div class="chip-group" id="segment-chips"></div>
        <input id="f-custom" name="custom" type="number"
               min="2" max="20" placeholder="Enter a number (2–20)"
               class="custom-number" hidden
               aria-label="Custom segment count">
      </fieldset>

      <fieldset class="field">
        <legend>Colour</legend>
        <div class="palette-grid" id="palette-grid"></div>
      </fieldset>

      <div class="dialog-actions">
        <button type="button" class="btn btn-ghost" id="dialog-cancel">Cancel</button>
        <button type="submit" class="btn btn-primary" id="dialog-submit">Add Clock</button>
      </div>
    </form>
  </dialog>

  <script src="app.js" defer></script>
</body>
</html>
